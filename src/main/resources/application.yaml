spring:
  application:
    name: delivery_tracking_system

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/delivery_tracking_system?allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      enabled: false

  data:
    web:
      pageable:
        max-page-size: 30

  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_EXPIRATION}